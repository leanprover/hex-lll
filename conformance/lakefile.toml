name = "hex-lll-conformance"
defaultTargets = ["HexLLLConformance", "hexlll_emit_fixtures"]

[[require]]
name = "HexLLL"
path = ".."

[[require]]
name = "hex-test-kit"
git = "https://github.com/kim-em/hex-test-kit.git"
rev = "a3355fd337e13fba815e22d55c1b21060ee4bbd1"

[[lean_lib]]
name = "HexLLLConformance"
globs = ["HexLLL.Conformance"]

[[lean_exe]]
name = "hexlll_emit_fixtures"
root = "HexLLL.EmitFixtures"
